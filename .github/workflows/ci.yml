name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Frontend ──────────────────────────────────────────────────────────────
  # Required status check for branch protection on main.
  frontend:
    name: frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Test
        working-directory: frontend
        run: npm run test

  # ── Backend ───────────────────────────────────────────────────────────────
  # Required status check for branch protection on main.
  backend:
    name: backend
    runs-on: ubuntu-latest

    env:
      # Dummy values so config.py loads without error in CI.
      # Integration tests that require real Supabase/MetaAPI credentials
      # use pytest.skip() when these env vars are absent or placeholder.
      SUPABASE_URL: "https://placeholder.supabase.co"
      SUPABASE_ANON_KEY: "placeholder-anon-key"
      SUPABASE_SERVICE_KEY: "placeholder-service-key"
      SUPABASE_JWT_SECRET: ""
      METAAPI_TOKEN: ""
      METAAPI_SYSTEM_ACCOUNT_ID: ""
      CORS_ORIGINS: "http://localhost:5173"
      ENV: "ci"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies and ruff
        working-directory: backend
        run: pip install -r requirements.txt ruff

      - name: Lint (ruff)
        working-directory: backend
        run: ruff check .

      - name: Test (pytest)
        working-directory: backend
        run: pytest
